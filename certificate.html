<!DOCTYPE html>
<html>

<head>

<title>Certificate Generator</title>

<style>

body{

background:#050816;

font-family:Arial;

text-align:center;

color:white;

padding:30px;

}

h1{

color:cyan;

text-shadow:0 0 15px cyan;

}

.input-box{

margin-top:30px;

}

input{

padding:12px;

width:300px;

font-size:18px;

border-radius:8px;

border:none;

}

button{

padding:12px 20px;

background:cyan;

border:none;

font-size:18px;

font-weight:bold;

margin-left:10px;

cursor:pointer;

border-radius:8px;

}

.certificate{

margin-top:40px;

background:white;

color:black;

padding:40px;

border-radius:15px;

max-width:800px;

margin-left:auto;

margin-right:auto;

display:none;

}

.certificate h2{

font-size:40px;

}

.name{

font-size:35px;

font-weight:bold;

color:darkblue;

margin:20px 0;

}

</style>

</head>

<body>

<h1>🏆 CyberVerse Certificate Generator</h1>

<div class="input-box">

<input
type="text"
id="studentName"
placeholder="Enter Your Name">

<button onclick="generateCertificate()">

Generate Certificate

</button>

</div>

<div class="certificate"
id="certificate">

<h2>🏆 CERTIFICATE OF COMPLETION</h2>

<p>

This certifies that

</p>

<div class="name"
id="displayName">

</div>

<p>

has successfully completed

</p>

<h3>

CyberVerse Cyber Security Training

</h3>

<p>

and demonstrated knowledge of:

</p>

<p>

✔ Password Security

<br>

✔ Phishing Awareness

<br>

✔ Network Security

<br>

✔ Linux Security

<br>

✔ Cyber Risk Assessment

</p>

</div>

<script>

function generateCertificate(){

let name =
document.getElementById(
"studentName"
).value;

if(name===""){

alert(
"Please Enter Name"
);

return;

}

document.getElementById(
"displayName"
).innerHTML=name;

document.getElementById(
"certificate"
).style.display="block";

}

</script>
<link rel="stylesheet" href="style.css">
</body>

</html>
